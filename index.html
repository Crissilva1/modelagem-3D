<html>
  <head>
    <title>terceira experiencia AR.js com imagem e com modelo 3D e marcador hiro</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-assets>
        <a-assets-item id="suzy monkey" src="suzane.glb"></a-assets-item>
      </a-assets>
      <a-marker preset="hiro">
       <a-entity id="modelo 3D" position="0 0 0"
         rotation="0 0 0" 
         scale="0.5 0.5 0.5" 
         gltf-model="#suzy monkey">
       </a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
